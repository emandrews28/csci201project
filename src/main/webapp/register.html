<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #222;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      width: min(92vw, 460px);
    }
    h1 { margin-top: 0; text-align: center; }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }
    button, a.button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }
    .register-btn {
      background: #2563eb;
      color: white;
    }
    .register-btn:hover { background: #1d4ed8; }
    .back-btn {
      background: #e5e7eb;
      color: #111827;
    }
    .back-btn:hover { background: #d1d5db; }
    .error {
      margin-top: 14px;
      color: #b91c1c;
      min-height: 1.2em;
    }
    .hint {
      margin-top: 14px;
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Register</h1>

    <form action="register" method="post" id="registerForm">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required minlength="3" maxlength="50" autocomplete="username" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required maxlength="100" autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" />

      <div class="buttons">
        <button class="register-btn" type="submit">Register</button>
        <a class="button back-btn" href="login.html">Back to Login</a>
      </div>
    </form>

    <div id="error" class="error"></div>
    <div class="hint">Username and email must be unique. Passwords do not need to be unique.</div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const errorEl = document.getElementById('error');

    if (error) {
      errorEl.textContent = error.replaceAll('_', ' ');
    }
  </script>
</body>
</html>
